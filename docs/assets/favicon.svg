<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Globe fill -->
  <circle cx="16" cy="16" r="13" fill="#0a1628"/>
  <!-- Globe outline -->
  <circle cx="16" cy="16" r="13" stroke="#d4a855" stroke-width="1.25"/>
  <!-- Latitude lines -->
  <ellipse cx="16" cy="16" rx="13" ry="4.2" stroke="#d4a855" stroke-width="0.8" opacity="0.5"/>
  <ellipse cx="16" cy="9.5"  rx="10" ry="2.8" stroke="#d4a855" stroke-width="0.8" opacity="0.5"/>
  <ellipse cx="16" cy="22.5" rx="10" ry="2.8" stroke="#d4a855" stroke-width="0.8" opacity="0.5"/>
  <!-- Longitude lines -->
  <ellipse cx="16" cy="16" rx="3" ry="13" stroke="#d4a855" stroke-width="0.8" opacity="0.5"/>
  <ellipse cx="16" cy="16" rx="9" ry="13" stroke="#d4a855" stroke-width="0.8" opacity="0.5"/>
  <!-- Radiating ring -->
  <circle cx="19.5" cy="10.5" r="4" stroke="#d4a855" stroke-width="1" fill="none" opacity="0.45"/>
  <!-- Data point pin -->
  <circle cx="19.5" cy="10.5" r="2" fill="#d4a855"/>
</svg>
