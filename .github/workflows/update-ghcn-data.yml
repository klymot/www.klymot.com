name: Update GHCN Data

on:
  schedule:
    - cron: '0 4 * * *'   # 04:00 UTC daily
  workflow_dispatch:        # allow manual runs

jobs:
  update:
    name: Fetch and commit latest GHCN data
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Generate GHCN monthly data
        run: uv run scripts/generate_ghcn_monthly.py

      - name: Commit and push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/
          if git diff --cached --quiet; then
            echo "No data changes — nothing to commit."
          else
            git commit -m "chore(data): update GHCN monthly data [skip ci]"
            git push origin main
          fi
